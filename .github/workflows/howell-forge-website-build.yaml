# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: ./

jobs:
# Please do not rename this job
  build-project:
    name: build howell-forge-website
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # --- Build GroundChiFlow (key from secrets only; output never committed) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build GroundChiFlow
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GROK_BRIDGE_URL: ${{ secrets.EXPO_PUBLIC_GROK_BRIDGE_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -e
          if [ -z "${GITLAB_TOKEN}" ]; then
            echo "::error::GITLAB_TOKEN secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          echo "Cloning GroundChiFlow from GitLab..."
          if ! git clone --depth 1 \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/ariesfiredragonfu/ground-chi-flow.git" \
            groundchiflow-src; then
            echo "::error::Git clone failed. Check that GITLAB_TOKEN is valid and has read_repository for ground-chi-flow."
            exit 1
          fi
          cd groundchiflow-src
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install react-native-web --legacy-peer-deps --no-audit --no-fund
          npx expo install react-native-web --fix
          npm install react-dom --legacy-peer-deps --no-audit --no-fund
          npx expo install react-dom --fix
          npm install react-native-worklets --legacy-peer-deps --no-audit --no-fund
          npx expo install react-native-worklets --fix
          npm install --legacy-peer-deps
          npm ls react-native-web
          npx expo export --platform web --output-dir dist
          cd ..
          rm -rf gcf
          cp -r groundchiflow-src/dist gcf
          echo "GroundChiFlow built at gcf/"

      - name: Remove build-only folder before GitHub Pages deploy
        run: rm -rf groundchiflow-src

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: fd997c9f-197d-4b3e-bddc-7db722502609
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/howell-forge-website/config.yaml
          action: upload

      # Deploy same build to GitHub Pages (live site without IONOS Docker/VPS)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
