# Deploy to GitHub Pages only (no IONOS). Runs on every push to main so the site is always live.
# Uses GitHub's official actions (no third-party container token issues).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build GroundChiFlow
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GROK_BRIDGE_URL: ${{ secrets.EXPO_PUBLIC_GROK_BRIDGE_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -e
          if [ -z "${GITLAB_TOKEN}" ]; then
            echo "::error::GITLAB_TOKEN secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "${EXPO_PUBLIC_GROK_BRIDGE_URL}" ]; then
            echo "::warning::EXPO_PUBLIC_GROK_BRIDGE_URL is not set. Coach will use default (grok.howell-forge.com). For Railway 24/7, add this secret with your Railway bridge URL."
          else
            echo "::notice::EXPO_PUBLIC_GROK_BRIDGE_URL is set (Coach will use Railway/custom bridge)."
          fi
          echo "Cloning GroundChiFlow from GitLab..."
          git clone --depth 1 --branch gcf-staging-exercise-ladders-20260320 \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/ariesfiredragonfu/ground-chi-flow.git" \
            groundchiflow-src
          cd groundchiflow-src
          echo "::notice title=GroundChiFlow source::Commit=$(git rev-parse --short HEAD) | DailyRoutine.ts lines=$(wc -l < constants/DailyRoutine.ts 2>/dev/null || echo 0)"
          if [ -f app.json ]; then
            node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (!app.expo) app.expo = {};
            if (!app.expo.experiments) app.expo.experiments = {};
            app.expo.experiments.baseUrl = '/howell-forge-website/gcf';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Set baseUrl for GitHub Pages subpath');
            "
          fi
          # Force bridge URL into .env so Expo web build definitely sees it (avoids CI env not inlining)
          printf 'EXPO_PUBLIC_GROK_BRIDGE_URL=%s\n' "$EXPO_PUBLIC_GROK_BRIDGE_URL" > .env
          # Also patch grokBridge.ts so DEFAULT_BRIDGE_URL is literally the Railway URL (guarantees bundle has it)
          if [ -n "$EXPO_PUBLIC_GROK_BRIDGE_URL" ] && [ -f lib/grokBridge.ts ]; then
            node -e "
              const fs = require('fs');
              const path = 'lib/grokBridge.ts';
              let s = fs.readFileSync(path, 'utf8');
              const raw = process.env.EXPO_PUBLIC_GROK_BRIDGE_URL || '';
              const url = raw.trim().replace(/\/$/, '');
              if (url.startsWith('http')) {
                s = s.replace(/const DEFAULT_BRIDGE_URL = '[^']*';/, 'const DEFAULT_BRIDGE_URL = ' + JSON.stringify(url) + ';');
                fs.writeFileSync(path, s);
                console.log('Patched grokBridge.ts DEFAULT_BRIDGE_URL to', url.substring(0, 40) + '...');
              }
            "
          fi
          npm install --legacy-peer-deps --no-audit --no-fund
          npm install react-native-web --legacy-peer-deps --no-audit --no-fund
          npx expo install react-native-web --fix
          npm install react-dom --legacy-peer-deps --no-audit --no-fund
          npx expo install react-dom --fix
          npm install react-native-worklets --legacy-peer-deps --no-audit --no-fund
          npx expo install react-native-worklets --fix
          npm install --legacy-peer-deps
          npx expo export --platform web --output-dir dist
          cd ..
          rm -rf gcf
          cp -r groundchiflow-src/dist gcf
          rm -rf groundchiflow-src
          echo "GroundChiFlow built at gcf/"

      - name: Add /groundchiflow redirect for GitHub Pages
        run: |
          mkdir -p groundchiflow
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=../gcf/"><title>Redirect to GroundChiFlow</title></head><body><p>Redirecting to <a href="../gcf/">GroundChiFlow</a>...</p></body></html>' > groundchiflow/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: deploy to Pages
    needs: build
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4