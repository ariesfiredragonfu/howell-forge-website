# Deploy to GitHub Pages only (no IONOS). Runs on every push to main so the site is always live.
# Uses GitHub's official actions (no third-party container token issues).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GroundChiFlow build temporarily skipped so deploy succeeds; add back when GCF build is fixed (other chat).
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: deploy to Pages
    needs: build
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4