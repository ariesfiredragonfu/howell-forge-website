    <style>
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        *, *::before, *::after { box-sizing: border-box; }

        :root {
            /* Staging: ~halfway between airy glass and original live panels (readability) */
            --hf-panel-banner: rgba(32, 32, 40, 0.02);
            --hf-panel: rgba(20, 20, 28, 0.21);
            --hf-panel-soft: rgba(20, 20, 28, 0.195);
            --hf-panel-mute: rgba(18, 18, 24, 0.16);
            --hf-panel-hero-lead: rgba(22, 22, 32, 0.18);
            --hf-panel-border: 1px solid rgba(160, 160, 178, 0.155);
            --hf-panel-shadow: 0 2px 12px rgba(0, 0, 0, 0.045);
            --hf-panel-radius: 14px;
            --hf-panel-radius-sm: 10px;
            --hf-glass: blur(6px) saturate(1.03);
            /* Top/bottom bar only — light glass (not content panels) */
            --hf-chrome-fill: rgba(0, 0, 0, 0.14);
            --hf-chrome-border: 1px solid rgba(255, 255, 255, 0.07);
            --hf-chrome-shadow: none;
            --hf-chrome-glass: blur(2px) saturate(1.02);
        }

        body { font-family: Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; background-color: #111; background-image: url('3d-background.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; color: #eee; }
        .header {
            background: var(--hf-chrome-fill);
            color: white;
            padding: 1rem;
            text-align: center;
            border-bottom: var(--hf-chrome-border);
            box-shadow: var(--hf-chrome-shadow);
            backdrop-filter: var(--hf-chrome-glass);
            -webkit-backdrop-filter: var(--hf-chrome-glass);
        }
        .header h1 { margin: 0 0 0.25rem 0; font-size: 1.8rem; letter-spacing: 0.05em; text-shadow: 0 2px 20px rgba(0, 0, 0, 0.78), 0 0 3px rgba(0, 0, 0, 0.92); }
        .header-tagline { margin: 0 0 0.65rem 0; font-size: 0.95rem; font-weight: normal; color: #d4d4dc; letter-spacing: 0.04em; text-shadow: 0 1px 14px rgba(0, 0, 0, 0.75), 0 0 1px rgba(0, 0, 0, 0.9); }
        .nav-buttons { display: flex; justify-content: center; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; flex-wrap: wrap; }
        .main-content { padding: 2rem; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 200px); padding-bottom: 5rem; }
        .footer {
            background: var(--hf-chrome-fill);
            color: #aaa;
            padding: 1rem;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.85rem;
            border-top: var(--hf-chrome-border);
            box-shadow: var(--hf-chrome-shadow);
            backdrop-filter: var(--hf-chrome-glass);
            -webkit-backdrop-filter: var(--hf-chrome-glass);
        }
        .nav-button { display: inline-block; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; background: rgba(0, 0, 0, 0.20); cursor: pointer; border: var(--hf-chrome-border); font-size: 0.9rem; transition: all 0.2s ease; backdrop-filter: var(--hf-chrome-glass); -webkit-backdrop-filter: var(--hf-chrome-glass); box-shadow: var(--hf-chrome-shadow); text-shadow: 0 1px 12px rgba(0, 0, 0, 0.68); }
        .nav-button:hover { background-color: #666; transform: translateY(-1px); }
        .nav-button:active { transform: translateY(1px); }
        .nav-button.primary { background-color: #0052ff; }
        .nav-button.primary:hover { background-color: #0040cc; }
        .nav-button.success { background-color: #28a745; }
        .nav-button.success:hover { background-color: #218838; }
        .nav-button.danger { background-color: #666; font-size: 0.8rem; padding: 6px 12px; }
        .nav-button.danger:hover { background-color: #c0392b; }
        .loading { text-align: center; padding: 2rem 1.5rem; font-size: 1.2rem; color: #aaa; animation: pulse 1.5s infinite; background: var(--hf-panel-soft); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); max-width: 520px; margin: 2rem auto; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .error-boundary { padding: 20px; text-align: center; background: rgba(42, 0, 0, 0.92); color: #ff6b6b; border-radius: var(--hf-panel-radius-sm); margin: 20px auto; max-width: 560px; border: 1px solid #662222; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }

        /* ── Auth Modal ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); padding: 2rem; width: 100%; max-width: 420px; animation: modalIn 0.2s ease; position: relative; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .modal h2 { margin: 0 0 1.25rem 0; color: #fff; font-size: 1.4rem; }
        .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #888; font-size: 1.4rem; cursor: pointer; line-height: 1; }
        .modal-close:hover { color: #fff; }
        .modal-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #333; }
        .modal-tab { flex: 1; padding: 0.6rem; background: none; border: none; color: #888; cursor: pointer; font-size: 0.95rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .modal-tab.active { color: #0052ff; border-bottom-color: #0052ff; }
        .modal-tab:hover:not(.active) { color: #ccc; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .form-group input { width: 100%; padding: 0.6rem 0.8rem; background: var(--hf-panel-mute); border: var(--hf-panel-border); border-radius: 6px; color: #fff; font-size: 0.95rem; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #0052ff; }
        .form-error { color: #ff6b6b; font-size: 0.82rem; margin: -0.5rem 0 0.75rem 0; }
        .form-success { color: #51cf66; font-size: 0.85rem; margin: 0.5rem 0; }
        .btn-full { width: 100%; padding: 0.7rem; background: #0052ff; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
        .btn-full:hover { background: #0040cc; }
        .btn-full:disabled { background: #333; color: #666; cursor: not-allowed; }
        .auth-divider { text-align: center; color: #555; font-size: 0.8rem; margin: 0.75rem 0; }
        .guest-link { color: #888; font-size: 0.82rem; text-align: center; margin-top: 0.75rem; }
        .guest-link a { color: #0052ff; cursor: pointer; text-decoration: underline; }

        /* ── Account Banner ── */
        .account-banner { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .account-banner .welcome { color: #cce0ff; font-size: 0.95rem; }
        .account-banner .welcome strong { color: #fff; }
        .account-badge { background: #0052ff; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-left: 0.5rem; vertical-align: middle; }
        .account-badge.admin { background: #e67e22; }
        .account-section { margin-top: 1.5rem; }
        .account-section h2 { color: #fff; margin-bottom: 1rem; }
        .account-card { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .account-card h3 { color: #ccc; margin: 0 0 0.75rem 0; font-size: 1rem; }
        .account-info-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .account-info-row:last-child { border-bottom: none; }
        .account-info-row .label { color: #888; }
        .account-info-row .value { color: #eee; }
        .empty-state { color: #555; font-size: 0.9rem; text-align: center; padding: 1.5rem 0; }

        /* ── Quote Form ── */
        .quote-section { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); padding: 1.5rem; margin-top: 2rem; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .quote-section h3 { color: #fff; margin: 0 0 1rem 0; }
        .quote-section textarea { width: 100%; padding: 0.6rem 0.8rem; background: var(--hf-panel-mute); border: var(--hf-panel-border); border-radius: 6px; color: #fff; font-size: 0.9rem; resize: vertical; min-height: 100px; font-family: Arial, sans-serif; }
        .quote-section textarea:focus { outline: none; border-color: #0052ff; }

        /* ── USDC Payment ── */
        .payment-section { margin-top: 2rem; padding: 1.5rem; background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .payment-section h3 { margin: 0 0 0.4rem 0; color: #4d9fff; font-size: 1.15rem; }
        .network-badge { display: inline-block; background: #0052ff; color: white; font-size: 0.72rem; font-weight: bold; padding: 2px 8px; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 0.05em; }
        .payment-layout { display: flex; gap: 1.5rem; align-items: flex-start; flex-wrap: wrap; }
        .payment-qr img { width: 130px; height: 130px; border: 3px solid #0052ff33; border-radius: 8px; display: block; }
        .payment-qr p { text-align: center; font-size: 0.7rem; color: #888; margin: 4px 0 0 0; }
        .payment-details { flex: 1; min-width: 200px; }
        .payment-details p { margin: 0 0 0.5rem 0; font-size: 0.9rem; color: #ccc; }
        .address-box { display: flex; align-items: center; gap: 8px; background: var(--hf-panel-mute); border: var(--hf-panel-border); border-radius: 6px; padding: 8px 12px; margin: 0.5rem 0; backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .address-box code { font-size: 0.75rem; color: #4d9fff; word-break: break-all; flex: 1; }
        .copy-btn { background: #0052ff; color: white; border: none; border-radius: 4px; padding: 4px 10px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
        .copy-btn:hover { background: #0040cc; }
        .copy-btn.copied { background: #28a745; }
        .payment-note { font-size: 0.78rem; color: #ddd; margin-top: 0.75rem; padding: 8px 10px; background: var(--hf-panel-mute); border: var(--hf-panel-border); border-left: 3px solid #f0ad00; border-radius: 6px; backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .wallet-section { text-align: center; margin: 1.5rem 0 0 0; padding: 1rem 1.25rem; background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .wallet-option { background-color: #4CAF50; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        .wallet-option:hover { background-color: #45a049; }
        .wallet-option:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        .wallet-option.metamask { background-color: #f6851b; }
        .wallet-option.metamask:hover { background-color: #e67e22; }

        /* ── Products / Pricing ── */
        .products-hero {
            text-align: center;
            padding: 1.65rem 1.35rem;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 1rem;
            max-width: 940px;
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .products-hero h2 { color: #fff; font-size: 2rem; margin: 0 0 0.5rem 0; text-shadow: 0 2px 18px rgba(0, 0, 0, 0.65), 0 0 1px rgba(0, 0, 0, 0.9); }
        .products-hero p { color: #d0d0d0; font-size: 1.1rem; max-width: 600px; margin: 0 auto 0.5rem auto; line-height: 1.6; }
        .products-hero .highlight { color: #4d9fff; font-weight: bold; }
        .crew-badge { display: inline-flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; margin: 1rem 0 2rem 0; }
        .crew-badge span { background: var(--hf-panel-mute); border: var(--hf-panel-border); color: #4d9fff; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin: 0 0 2rem 0; }
        .pricing-card { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); padding: 1.75rem 1.5rem; display: flex; flex-direction: column; position: relative; transition: border-color 0.2s, transform: 0.2s; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .pricing-card:hover { border-color: #0052ff88; transform: translateY(-3px); }
        .pricing-card.featured { border: 2px solid rgba(0, 82, 255, 0.38); background: linear-gradient(135deg, rgba(22, 24, 42, 0.22), rgba(12, 18, 52, 0.18)); box-shadow: var(--hf-panel-shadow), 0 0 14px rgba(0, 82, 255, 0.07); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .featured-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #0052ff; color: white; font-size: 0.72rem; font-weight: bold; padding: 3px 14px; border-radius: 20px; letter-spacing: 0.06em; white-space: nowrap; }
        .pricing-card .tier-name { color: #aaa; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 0.4rem 0; }
        .pricing-card .price { font-size: 2.4rem; font-weight: bold; color: #fff; margin: 0 0 0.2rem 0; line-height: 1; }
        .pricing-card .price span { font-size: 1rem; color: #888; font-weight: normal; }
        .pricing-card .price-sub { color: #888; font-size: 0.82rem; margin: 0 0 1.25rem 0; }
        .pricing-card .price-coming-soon { font-size: 1.65rem; font-weight: bold; color: #888; margin: 0 0 0.2rem 0; letter-spacing: 0.04em; text-transform: uppercase; }
        .pricing-card .price-coming-soon-sub { color: #666; font-size: 0.82rem; margin: 0 0 1.25rem 0; }
        .pricing-card .buy-btn.disabled-soon { background: #2a2a2a !important; color: #777 !important; border-color: #444 !important; cursor: default; pointer-events: none; }
        .pricing-card .feature-list { list-style: none; padding: 0; margin: 0 0 1.5rem 0; flex: 1; }
        .pricing-card .feature-list li { color: #ccc; font-size: 0.88rem; padding: 0.35rem 0; border-bottom: 1px solid #222; display: flex; align-items: flex-start; gap: 0.5rem; }
        .pricing-card .feature-list li:last-child { border-bottom: none; }
        .pricing-card .feature-list li::before { content: "✓"; color: #0052ff; font-weight: bold; flex-shrink: 0; }
        .pricing-card .buy-btn { display: block; text-align: center; padding: 0.75rem; border-radius: 8px; font-size: 1rem; font-weight: bold; text-decoration: none; transition: background 0.2s; cursor: pointer; }
        .pricing-card .buy-btn.primary { background: #0052ff; color: white; }
        .pricing-card .buy-btn.primary:hover { background: #0040cc; }
        .pricing-card .buy-btn.outline { background: transparent; color: #0052ff; border: 2px solid #0052ff; }
        .pricing-card .buy-btn.outline:hover { background: #0052ff22; }
        .vtp-starter-ctas { display: flex; flex-direction: column; gap: 0.65rem; width: 100%; margin-top: 0.25rem; }
        .vtp-starter-ctas .buy-btn { margin: 0; }
        .value-callout { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 1.25rem 1.5rem; margin-bottom: 2rem; text-align: center; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .value-callout p { margin: 0; color: #ccc; font-size: 0.95rem; }
        .value-callout strong { color: #7bc67e; }
        /* Full-width playbook row — same max-width as .products-hero, above 3-tier pricing grid */
        .playbook-wide {
            max-width: 940px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 1.5rem;
            padding: 1.35rem 1.5rem;
            text-align: center;
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .playbook-wide h3 { color: #fff; font-size: 1.35rem; margin: 0 0 0.5rem 0; letter-spacing: 0.03em; text-shadow: 0 2px 14px rgba(0, 0, 0, 0.65); }
        .playbook-wide .playbook-lede { margin: 0 0 1.1rem 0; color: #c8c8d0; font-size: 0.98rem; line-height: 1.55; max-width: 640px; margin-left: auto; margin-right: auto; }
        .playbook-wide .playbook-cta {
            display: block; width: 100%; box-sizing: border-box;
            padding: 1.05rem 1.25rem; font-size: 1.12rem; font-weight: bold; border-radius: 10px;
            background: #0052ff; color: #fff; text-decoration: none; text-align: center;
            border: 3px solid rgba(0, 82, 255, 0.85); cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.45);
        }
        .playbook-wide .playbook-cta:hover { background: #0040cc; border-color: #00d4ff99; }
        .includes-section { margin-bottom: 2rem; }
        .includes-section h3 {
            color: #fff;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
            display: inline-block;
            padding: 0.45rem 1rem;
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius-sm);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .includes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; }
        .include-item { background: var(--hf-panel-soft); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 0.75rem 1rem; display: flex; align-items: flex-start; gap: 0.6rem; box-shadow: none; backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .include-item .icon { font-size: 1.2rem; flex-shrink: 0; }
        .include-item .text { font-size: 0.85rem; color: #ccc; }
        .include-item .text strong { color: #fff; display: block; margin-bottom: 0.1rem; }

        /* ── Landing / Home ── */
        .hero-above {
            text-align: center;
            color: #fff;
            font-size: 2.2rem;
            margin: 0 auto 1rem auto;
            max-width: 920px;
            padding: 1.1rem 1.25rem;
            line-height: 1.2;
            letter-spacing: 0.02em;
            background: var(--hf-panel-hero-lead);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
            text-shadow: 0 2px 22px rgba(0, 0, 0, 0.84), 0 0 3px rgba(0, 0, 0, 0.95);
        }
        .landing-hero {
            position: relative;
            min-height: 280px;
            aspect-ratio: 1129/630;
            border-radius: var(--hf-panel-radius);
            overflow: hidden;
            margin: 0 auto 1.5rem auto;
            max-width: 960px;
            background-image: url('og-image-small.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            border: var(--hf-panel-border);
            box-shadow: var(--hf-panel-shadow);
        }
        .hero-below {
            text-align: center;
            padding: 1.2rem 1.35rem 1.5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .hero-below .landing-subhead { margin-bottom: 1rem; }
        .landing-subhead { color: #d8d8d8; font-size: 1.1rem; max-width: 640px; margin: 0 auto 1.5rem auto; line-height: 1.65; }
        .landing-cta { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .landing-cta .nav-button { padding: 12px 24px; font-size: 1rem; }
        .stripe-callout { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 1rem 1.25rem; margin-bottom: 1.5rem; text-align: center; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .stripe-callout p { margin: 0; color: #ccc; font-size: 0.95rem; }
        .stripe-callout a { color: #4d9fff; font-weight: bold; text-decoration: none; }
        .stripe-callout a:hover { text-decoration: underline; }
        .landing-section-title {
            color: #c8c8c8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 2rem auto 0.75rem auto;
            display: table;
            padding: 0.4rem 1rem;
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius-sm);
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .readability-panel {
            background: var(--hf-panel);
            border: var(--hf-panel-border);
            border-radius: var(--hf-panel-radius);
            padding: 1.35rem 1.5rem;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 1.5rem;
            max-width: 920px;
            box-shadow: var(--hf-panel-shadow);
            backdrop-filter: var(--hf-glass);
            -webkit-backdrop-filter: var(--hf-glass);
        }
        .readability-panel h2 { color: #fff; margin: 0 0 0.75rem 0; }
        .readability-panel p { color: #d8d8d8; margin: 0 0 0.75rem 0; line-height: 1.65; }
        .readability-panel p:last-child { margin-bottom: 0; }
        .home-products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; margin: 2rem 0; }
        .home-product-card { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); padding: 1.25rem; transition: border-color 0.2s, transform 0.2s; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .home-product-card:hover { border-color: #0052ff66; transform: translateY(-2px); }
        .home-product-card h3 { color: #fff; margin: 0 0 0.5rem 0; font-size: 1.15rem; }
        .home-product-card .price { color: #4d9fff; font-weight: bold; font-size: 1.1rem; margin: 0 0 0.75rem 0; }
        .home-product-card ul { margin: 0 0 1rem 0; padding-left: 1.25rem; color: #ccc; font-size: 0.9rem; line-height: 1.6; }
        .home-product-card ul li { margin-bottom: 0.35rem; }
        .home-product-card .card-cta { display: inline-block; margin-top: 0.5rem; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.9rem; text-decoration: none; background: #0052ff; color: white; transition: background 0.2s; }
        .home-product-card .card-cta:hover { background: #0040cc; }
        .testimonials-placeholder { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius); padding: 2rem; margin: 2rem 0; text-align: center; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .testimonials-placeholder h3 { color: #aaa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 1rem 0; }
        .testimonials-placeholder p { color: #b0b0b0; font-size: 0.9rem; margin: 0; }
        .testimonial-quote { font-style: italic; color: #aaa !important; margin-bottom: 0.35rem !important; }
        .testimonial-attribution { color: #888 !important; font-size: 0.85rem !important; }

        /* ── Quick Wins ── */
        .current-build { background: var(--hf-panel); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); padding: 0.6rem 1rem; margin: 1rem 0; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: #ddd; box-shadow: var(--hf-panel-shadow); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .current-build .dot { width: 6px; height: 6px; background: #28a745; border-radius: 50%; animation: pulse 2s infinite; }
        .stack-icons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 1.5rem 0; padding: 1rem 1.25rem; background: var(--hf-panel-soft); border: var(--hf-panel-border); border-radius: var(--hf-panel-radius-sm); box-shadow: var(--hf-panel-shadow); max-width: 520px; margin-left: auto; margin-right: auto; backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .stack-icons a { color: #aaa; text-decoration: none; font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; border: var(--hf-panel-border); transition: color 0.2s, border-color 0.2s; background: var(--hf-panel-mute); backdrop-filter: var(--hf-glass); -webkit-backdrop-filter: var(--hf-glass); }
        .stack-icons a:hover { color: #4d9fff; border-color: #0052ff44; }

        /* ── Phase 1: Grok enhancements ── */
        html { scroll-behavior: smooth; }
        .dither-accent {
            height: 4px;
            background: linear-gradient(to right, #000 50%, #333 50%);
            background-size: 4px 4px;
            image-rendering: pixelated;
            margin: 1rem 0;
        }
        .stack-icons a, .footer a { position: relative; display: inline-block; }
        .stack-icons a::after, .footer a::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 100%; height: 2px;
            background: #00d4ff;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .stack-icons a:hover, .footer a:hover { color: #00d4ff; }
        .stack-icons a:hover::after, .footer a:hover::after { transform: scaleX(1); box-shadow: 0 0 8px rgba(0, 212, 255, 0.6); }
        .nav-button:hover { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .brutal-cta {
            border: 3px solid rgba(0, 82, 255, 0.8);
            position: relative;
        }
        .brutal-cta:hover {
            animation: brutal-flash 0.6s ease;
        }
        @keyframes brutal-flash {
            0%, 100% { border-color: rgba(0, 82, 255, 0.8); box-shadow: 0 0 0 rgba(0, 82, 255, 0); }
            50% { border-color: #00d4ff; box-shadow: 0 0 12px rgba(0, 212, 255, 0.5); }
        }

        /* ── Phase 2: Scroll reveal + Text wipe ── */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out, box-shadow 0.6s ease-out;
        }
        .scroll-reveal.glow-visible {
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.1);
        }
        /* No cyan halo on glass panels — match unified light blocks */
        .products-hero.scroll-reveal.glow-visible,
        .pricing-card.scroll-reveal.glow-visible,
        .pricing-grid.scroll-reveal.glow-visible,
        .readability-panel.scroll-reveal.glow-visible,
        .home-product-card.scroll-reveal.glow-visible,
        .include-item.scroll-reveal.glow-visible,
        .stripe-callout.scroll-reveal.glow-visible,
        .value-callout.scroll-reveal.glow-visible,
        .playbook-wide.scroll-reveal.glow-visible,
        .testimonials-placeholder.scroll-reveal.glow-visible {
            box-shadow: var(--hf-panel-shadow);
        }
        .reveal-text {
            animation: textWipe 1.2s ease-out forwards;
        }
        @keyframes textWipe {
            from { opacity: 0; transform: translateX(-24px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ── Phase 3: Save spinner (A2) ── */
        .btn-full.saving { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-full.saving .save-spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: saveSpin 0.7s linear infinite;
        }
        @keyframes saveSpin { to { transform: rotate(360deg); } }
        .btn-full.saved { background: #28a745 !important; color: white; }
        .btn-full.saved:hover { background: #28a745 !important; }

        /* ── Phase 3: Particle burst (A6) ── */
        .particle-burst { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .particle-burst .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            animation: particleOut 0.5s ease-out forwards;
        }
        @keyframes particleOut {
            to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* ── Phase 4: Bento layout (#4) ── */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 1rem;
        }
        @media (min-width: 900px) {
            .bento-grid .bento-span-2 { grid-column: span 2; }
        }
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .bento-grid .bento-span-2 { grid-column: span 2; }
        }
        @media (max-width: 480px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-grid .bento-span-2 { grid-column: span 1; }
        }

        /* ── Phase 4: Expand cards (A8) ── */
        .include-item.expandable { cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .include-item.expandable:hover { border-color: #0052ff66; background: var(--hf-panel); }
        .include-item.expandable .expand-content {
            max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out;
        }
        .include-item.expandable.active .expand-content { max-height: 120px; }
        .include-item.expandable .expand-content { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #333; font-size: 0.8rem; color: #888; }

        /* ── Phase 4: Typography pulse (A9) ── */
        .typography-pulse-trigger { transition: transform 0.3s, filter 0.3s; }
        .typography-pulse-trigger.typography-pulse-active {
            animation: typographyPulse 1.5s ease-out;
        }
        @keyframes typographyPulse {
            0% { transform: scale(1); filter: brightness(1); }
            25% { transform: scale(1.02); filter: brightness(1.15); }
            50% { transform: scale(1); filter: brightness(1); }
            75% { transform: scale(1.01); filter: brightness(1.08); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .header, .footer, .modal, .products-hero, .hero-above, .hero-below, .playbook-wide, .pricing-card, .home-product-card, .readability-panel, .include-item, .stack-icons, .nav-button, .landing-hero { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
            .nav-button, .loading, .modal { transition: none; animation: none; }
            .brutal-cta:hover { animation: none; }
            .scroll-reveal { opacity: 1; transform: none; }
            .scroll-reveal.glow-visible { box-shadow: none; }
            .reveal-text { animation: none; opacity: 1; transform: none; }
            .btn-full.saving .save-spinner { animation: none; }
            .particle-burst .particle { animation: none; }
            .include-item.expandable .expand-content { transition: none; }
            .typography-pulse-trigger.typography-pulse-active { animation: none; }
            .landing-hero { background-attachment: scroll; }
        }
        @media (max-width: 600px) { .payment-layout { flex-direction: column; } .payment-qr img { width: 100px; height: 100px; } .account-banner { flex-direction: column; align-items: flex-start; } .hero-above { font-size: 1.6rem; } .header-tagline { font-size: 0.85rem; } .home-products { grid-template-columns: 1fr; } .landing-cta { flex-direction: column; } .landing-cta .nav-button, .landing-cta a { width: 100%; text-align: center; box-sizing: border-box; } }
    </style>
</head>
<body>
    <div id="root"><div class="loading" id="loading-msg">Loading...</div></div>
    <script>
        setTimeout(function() {
            var root = document.getElementById('root');
            var msg = document.getElementById('loading-msg');
            if (msg && root && root.children.length === 1 && msg.textContent.indexOf('Loading') !== -1) {
                msg.innerHTML = 'Taking a while? This site compiles in the browser (first load can take 15–30 sec). <br>Wait a bit longer or press <kbd>F12</kbd> → Console to check for errors.';
                msg.style.maxWidth = '420px';
                msg.style.margin = '2rem auto';
            }
        }, 15000);
    </script>

    <script type="text/babel">
        const BUSINESS_WALLET = "0x62eF356e555BCb06E4aD3328367df9e2d9d74168";
        const QR_URL = `https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=${BUSINESS_WALLET}`;
        const API = "https://howell-forge-shop-production.up.railway.app";
        const STRIPE_PLAYBOOK = "https://buy.stripe.com/3cIfZa1h7cqu8SI8ig7Zu05";
        const STRIPE_VOICE_PART_PER_JOB = "https://buy.stripe.com/cNi3co4tj76ad8Yaqo7Zu06";
        const STRIPE_VOICE_PART_STARTER_MONTHLY = "https://buy.stripe.com/fZuaEQaRHaim9WM0PO7Zu07";
        const STRIPE_VOICE_PART_STARTER_YEARLY = "https://buy.stripe.com/5kQaEQ3pf2PU6KAfKI7Zu09";
        const STRIPE_VOICE_PART_PRO = "https://buy.stripe.com/8x200c5xn0HMb0Q4207Zu08";
        const getToken = () => localStorage.getItem('hf_token');
        const getUser  = () => { try { return JSON.parse(localStorage.getItem('hf_user') || 'null'); } catch { return null; } };
        const saveAuth = (token, user) => { localStorage.setItem('hf_token', token); localStorage.setItem('hf_user', JSON.stringify(user)); };
        const clearAuth = () => { localStorage.removeItem('hf_token'); localStorage.removeItem('hf_user'); };

        function particleBurst(e, onComplete) {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { onComplete?.(); return; }
            const colors = ['#00d4ff', '#ff9500', '#ffd700', '#ff6b35'];
            const container = document.createElement('div');
            container.className = 'particle-burst';
            container.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;`;
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 + Math.random() * 0.5;
                const dist = 60 + Math.random() * 40;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `--tx:${tx}px;--ty:${ty}px;background:${colors[i % colors.length]};box-shadow:0 0 6px ${colors[i % colors.length]};`;
                container.appendChild(p);
            }
            document.body.appendChild(container);
            setTimeout(() => { container.remove(); onComplete?.(); }, 520);
        }

        function handleVoicePartStarterMonthly(e) {
            e.preventDefault();
            particleBurst(e, () => { window.open(STRIPE_VOICE_PART_STARTER_MONTHLY, '_blank'); });
        }
        function handleVoicePartStarterYearly(e) {
            e.preventDefault();
            particleBurst(e, () => { window.open(STRIPE_VOICE_PART_STARTER_YEARLY, '_blank'); });
        }
        function handleVoicePartPro(e) {
            e.preventDefault();
            particleBurst(e, () => { window.open(STRIPE_VOICE_PART_PRO, '_blank'); });
        }

        async function apiFetch(path, options = {}) {
            const token = getToken();
            const res = await fetch(`${API}${path}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(options.headers || {}) },
            });
            return res.json();
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('Error:', error, info); }
            render() {
                if (this.state.hasError) return (<div className="error-boundary"><h3>Something went wrong</h3><p>{this.state.error?.message}</p><button onClick={() => window.location.reload()}>Refresh</button></div>);
                return this.props.children;
            }
        }

        function AuthModal({ onClose, onAuth }) {
            const [tab, setTab] = React.useState('login');
            const [form, setForm] = React.useState({ name: '', email: '', password: '' });
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
            const submit = async (e) => {
                e.preventDefault(); setError(''); setLoading(true);
                try {
                    const body = tab === 'login' ? { email: form.email, password: form.password } : { name: form.name, email: form.email, password: form.password };
                    const data = await apiFetch(`/auth/${tab}`, { method: 'POST', body: JSON.stringify(body) });
                    if (data.error) { setError(data.error); return; }
                    saveAuth(data.token, data.user); onAuth(data.user); onClose();
                } catch (err) { setError('Connection error. Please try again.'); } finally { setLoading(false); }
            };
            return (
                <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="modal">
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <h2>Howell Forge Account</h2>
                        <div className="modal-tabs">
                            <button className={`modal-tab${tab === 'login' ? ' active' : ''}`} onClick={() => { setTab('login'); setError(''); }}>Sign In</button>
                            <button className={`modal-tab${tab === 'register' ? ' active' : ''}`} onClick={() => { setTab('register'); setError(''); }}>Create Account</button>
                        </div>
                        <form onSubmit={submit}>
                            {tab === 'register' && (<div className="form-group"><label>Full Name</label><input type="text" value={form.name} onChange={set('name')} placeholder="Your name" required autoFocus /></div>)}
                            <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={set('email')} placeholder="you@example.com" required autoFocus={tab === 'login'} /></div>
                            <div className="form-group"><label>Password {tab === 'register' && <span style={{color:'#555',fontSize:'0.75rem'}}>(min 8 characters)</span>}</label><input type="password" value={form.password} onChange={set('password')} placeholder="••••••••" required minLength={tab === 'register' ? 8 : 1} /></div>
                            {error && <p className="form-error">{error}</p>}
                            <button type="submit" className="btn-full" disabled={loading}>{loading ? 'Please wait...' : tab === 'login' ? 'Sign In' : 'Create Account'}</button>
                        </form>
                        <div className="auth-divider">or</div>
                        <div className="guest-link"><a onClick={onClose}>Continue as guest →</a></div>
                    </div>
                </div>
            );
        }

        function QuoteForm({ user }) {
            const [form, setForm] = React.useState({ name: user?.name || '', email: user?.email || '', details: '' });
            const [status, setStatus] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [saved, setSaved] = React.useState(false);
            const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
            const submit = async (e) => {
                e.preventDefault(); setLoading(true); setStatus(null); setSaved(false);
                try {
                    const data = await apiFetch('/api/quote', { method: 'POST', body: JSON.stringify(form) });
                    if (data.error) { setStatus({ type: 'error', msg: data.error }); return; }
                    setStatus({ type: 'success', msg: data.message }); setForm(f => ({ ...f, details: '' })); setSaved(true);
                    setTimeout(() => setSaved(false), 2200);
                } catch { setStatus({ type: 'error', msg: 'Failed to send. Please email us directly.' }); } finally { setLoading(false); }
            };
            const btnClass = ['btn-full', loading && 'saving', saved && 'saved'].filter(Boolean).join(' ');
            return (
                <div className="quote-section">
                    <h3>Request a Quote</h3>
                    <form onSubmit={submit}>
                        {!user && (
                            <div style={{display:'flex',gap:'1rem',flexWrap:'wrap',marginBottom:'0.5rem'}}>
                                <div className="form-group" style={{flex:1,minWidth:'140px'}}><label>Your Name</label><input type="text" value={form.name} onChange={set('name')} placeholder="Full name" required /></div>
                                <div className="form-group" style={{flex:1,minWidth:'140px'}}><label>Email</label><input type="email" value={form.email} onChange={set('email')} placeholder="you@example.com" required /></div>
                            </div>
                        )}
                        {user && <p style={{color:'#888',fontSize:'0.85rem',marginBottom:'0.75rem'}}>Submitting as <strong style={{color:'#ccc'}}>{user.name}</strong> ({user.email})</p>}
                        <div className="form-group"><label>Project Details</label><textarea value={form.details} onChange={set('details')} placeholder="Describe your part: material, dimensions, quantity, tolerances, finish, timeline..." required /></div>
                        {status && <p className={status.type === 'success' ? 'form-success' : 'form-error'}>{status.msg}</p>}
                        <button type="submit" className={btnClass} disabled={loading}>
                            {loading && <span className="save-spinner" />}
                            {loading ? 'Sending...' : saved ? 'Saved ✓' : 'Send Quote Request'}
                        </button>
                    </form>
                </div>
            );
        }

        function AccountPage({ user, onLogout }) {
            const [orders, setOrders] = React.useState([]);
            const [quotes, setQuotes] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            React.useEffect(() => {
                Promise.all([apiFetch('/auth/orders'), apiFetch('/auth/quotes')]).then(([o, q]) => { setOrders(o.orders || []); setQuotes(q.quotes || []); }).finally(() => setLoading(false));
            }, []);
            return (
                <div className="account-section">
                    <h2>My Account {user.role === 'admin' && <span className="account-badge admin">ADMIN</span>}</h2>
                    <div className="account-card">
                        <h3>Account Details</h3>
                        <div className="account-info-row"><span className="label">Name</span><span className="value">{user.name}</span></div>
                        <div className="account-info-row"><span className="label">Email</span><span className="value">{user.email}</span></div>
                        <div className="account-info-row"><span className="label">Role</span><span className="value" style={{textTransform:'capitalize'}}>{user.role}</span></div>
                    </div>
                    {loading ? <p className="loading">Loading your history...</p> : (<>
